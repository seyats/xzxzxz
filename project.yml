name: Tide
options:
  bundleIdPrefix: com.tide
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Tide:
    type: application
    platform: iOS
    sources:
      - path: Tide
        excludes:
          - Resources
    resources:
      - path: Tide/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tide.app
        CODE_SIGN_ENTITLEMENTS: Tide/Tide.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Tide
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
        INFOPLIST_KEY_NSCameraUsageDescription: Tide uses the camera for posts, stories and calls.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Tide uses the microphone for voice messages and calls.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Tide uses your library to share photos and videos.
        INFOPLIST_KEY_NSFaceIDUsageDescription: Tide uses Face ID to protect administrator tools.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Tide can connect to a development server on your local network.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleURLTypes_0_CFBundleURLSchemes_0: tide
        INFOPLIST_KEY_UIBackgroundModes_0: remote-notification
        INFOPLIST_KEY_UIBackgroundModes_1: audio
        INFOPLIST_KEY_TideAPIBaseURL: ""
        INFOPLIST_KEY_TideWebSocketURL: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    scheme:
      testTargets:
        - TideTests
  TideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TideTests
    dependencies:
      - target: Tide
