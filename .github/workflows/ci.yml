name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build and test
        run: bash Tools/ci-test.sh
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TideTests-xcresult
          path: build/TideTests.xcresult
          if-no-files-found: ignore
          retention-days: 14

  build-ipa:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Check signing assets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          if [[ -n "$APPLE_TEAM_ID" && -n "$IOS_CERT_BASE64" && -n "$IOS_CERT_PASSWORD" && -n "$IOS_PROFILE_BASE64" ]]; then
            echo "SIGNING_READY=true" >> "$GITHUB_ENV"
            echo "Signing assets found."
          else
            echo "SIGNING_READY=false" >> "$GITHUB_ENV"
            echo "Signing assets are missing, skipping IPA export."
          fi
      - name: Build IPA
        if: env.SIGNING_READY == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: bash Tools/ci-ipa.sh
      - name: Skip IPA export
        if: env.SIGNING_READY != 'true'
        run: echo "No signing secrets configured, IPA export skipped."
      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Tide.ipa
          path: build/Tide.ipa
          if-no-files-found: ignore
          retention-days: 14
